<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>ZSFan 的博客</title>
    <link rel="icon" href="/logo.png?v=3" />
    <link rel="shortcut icon" href="/logo.png?v=3" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <link rel="alternate" type="application/rss+xml" title="ZSFan 的博客 RSS" href="/feed.xml" />
    <meta name="description" content="ZSFan 的个人博客，记录 Android 开发、全栈技术与 Cloudflare 实践。" />
    <meta name="keywords" content="ZSFan 的博客,ZSFan,Android开发,全栈开发,Cloudflare,技术分享,Kotlin,TypeScript" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f5f4" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#09090b" />

    <!-- DNS 预解析和预连接优化 -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- 字体加载优化：异步加载避免阻塞渲染，减少不常用权重 -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    </noscript>

  <script>
    (function () {
      var original = document.title;
      var away = 'w(°Д°)w 不要走！再看看嘛~';
      var back  = '♪(^▽^*) 欢迎回来！';
      var backTimer = null;
      document.addEventListener('visibilitychange', function () {
        clearTimeout(backTimer);
        if (document.hidden) {
          document.title = away;
        } else {
          document.title = back;
          backTimer = setTimeout(function () {
            document.title = original;
          }, 3000);
        }
      });
    })();
  </script>
</head>
  <body class="bg-paper text-ink dark:bg-void dark:text-gray-200 overflow-x-hidden">
    <div class="bg-noise"></div>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>

  <!-- Umami Analytics -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="a94473a1-ffcb-421b-8ebc-70eb7c821ee6"></script>
  <!-- End Umami Analytics -->

</body>
</html>
