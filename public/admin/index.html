<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZSFan Blog Admin</title>
<link rel="icon" href="/logo.png?v=3" />
<link rel="shortcut icon" href="/logo.png?v=3" />
<link rel="apple-touch-icon" href="/pwa-192.png" />
<meta name="theme-color" content="#f5f5f4" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- EasyMDE Markdown 编辑器 -->
<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f4;--surface:#ffffff;--surface-2:#fafaf9;--border:#e7e5e4;
  --text:#1c1917;--muted:#78716c;--faint:#a8a29e;
  --primary:#0f172a;--primary-hover:#1e293b;--primary-contrast:#ffffff;
  --accent:#2563eb;--accent-hover:#1d4ed8;
  --error:#dc2626;--success:#16a34a;
  --radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
@media(prefers-color-scheme:dark){
:root{
  --bg:#111110;--surface:#1c1b1a;--surface-2:#232221;--border:#2e2c2b;
  --text:#e7e5e4;--muted:#a8a29e;--faint:#57534e;
  --primary:#f5f5f4;--primary-hover:#e7e5e4;--primary-contrast:#111110;
}}
html{font-family:'Inter',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;color-scheme:light dark}
body{background:var(--bg);color:var(--text);min-height:100dvh;transition:background .2s,color .2s}
button,input,select,textarea{-webkit-appearance:none;appearance:none;outline:none!important;box-shadow:none!important;-webkit-tap-highlight-color:transparent!important;-webkit-touch-callout:none;user-select:none}
button:focus,button:focus-visible,button:focus-within,button:active,button::-moz-focus-inner,input:focus,input:focus-visible,input:active,select:focus,select:focus-visible,textarea:focus,textarea:focus-visible{outline:none!important;box-shadow:none!important;border-color:inherit}
*{-webkit-tap-highlight-color:rgba(0,0,0,0)!important}


/* ── Login ── */
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px;width:100%;max-width:380px;box-shadow:0 18px 50px rgba(15,23,42,.08);position:relative;z-index:1}
.login-card h1{font-size:18px;font-weight:600;margin-bottom:6px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:28px}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.field input{background:var(--surface-2);border:1px solid var(--border);border-radius:16px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .2s ease,box-shadow .2s ease,background .2s ease}
.field input:focus{border-color:color-mix(in srgb,var(--accent) 78%,white);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 14%,transparent);background:var(--surface)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:40px;padding:0 16px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:background .2s ease,color .2s ease,border-color .2s ease,transform .2s ease,box-shadow .2s ease}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--primary);color:var(--primary-contrast);width:100%;box-shadow:0 10px 30px rgba(15,23,42,.14)}
.btn-primary:hover{background:var(--primary-hover)}
.btn-sm{min-height:34px;padding:0 13px;font-size:12px}
.btn-ghost{background:var(--surface-2);border-color:var(--border);color:var(--text)}
.btn-ghost:hover{background:var(--surface)}
.btn-danger{background:rgba(220,38,38,.1);border-color:rgba(220,38,38,.16);color:var(--error)}
.btn-danger:hover{background:rgba(220,38,38,.16)}
.error-msg{color:var(--error);font-size:12px;margin-top:8px;display:none}

/* ── Login Shell ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:24px;background:linear-gradient(135deg, color-mix(in srgb,var(--bg) 88%,transparent), color-mix(in srgb,var(--surface-2) 72%,transparent));position:relative}
.login-shell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;width:100%;max-width:420px}
.login-shell .login-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-.01em;margin-bottom:4px;text-align:center}
.login-shell .login-desc{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px}

/* ── App Shell ── */
#app{display:none;flex-direction:column;min-height:100dvh}
.topbar{background:color-mix(in srgb,var(--surface) 88%,transparent);border-bottom:1px solid color-mix(in srgb,var(--border) 82%,transparent);padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.topbar-left{display:flex;align-items:center;gap:18px}
.logo{display:inline-flex;align-items:center;height:40px;padding:0 14px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);font-size:15px;font-weight:600;letter-spacing:-.01em}
.tab-nav{display:flex;align-items:center;gap:8px;padding:4px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border)}
.tab{padding:8px 14px;border-radius:999px;font-size:13px;cursor:pointer;border:none;background:transparent;color:var(--muted);font-weight:600;transition:background .2s ease,color .2s ease,transform .2s ease}
.tab:hover{background:var(--surface);color:var(--text);transform:translateY(-1px)}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 8px 24px rgba(15,23,42,.08)}
.topbar-right{display:flex;align-items:center;gap:10px}
.theme-toggle{position:relative;width:48px;height:48px;border:none;border-radius:50%;background:var(--theme-toggle-bg);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .25s ease,box-shadow .25s ease,background-color .25s ease;overflow:visible;padding:0}
.theme-toggle:hover{transform:translateY(-1px) scale(1.02);box-shadow:0 10px 24px rgba(0,0,0,.08)}
.theme-toggle:active{transform:translateY(0) scale(.98)}
.theme-toggle-ring{position:absolute;inset:6px;border-radius:50%;background:var(--theme-toggle-inner);box-shadow:inset 0 1px 2px rgba(255,255,255,.65), inset 0 -2px 6px rgba(0,0,0,.06)}
.theme-toggle-icon-wrap{position:relative;width:24px;height:24px;display:flex;align-items:center;justify-content:center;z-index:1}
.theme-toggle svg{position:absolute;width:22px;height:22px;transition:transform .28s cubic-bezier(.2,.8,.2,1),opacity .28s cubic-bezier(.2,.8,.2,1);opacity:0;transform:scale(.72)}
.theme-toggle-icon-light{opacity:1;transform:scale(1)}
.theme-toggle-icon-dark,.theme-toggle-icon-system{opacity:0;transform:scale(.72)}
[data-theme="light"] .theme-toggle{--theme-toggle-bg:#1f1f23;--theme-toggle-inner:#2b2b31;--theme-icon:#f0c96a}
[data-theme="dark"] .theme-toggle{--theme-toggle-bg:#f5f5f5;--theme-toggle-inner:#ebecef;--theme-icon:#202124}
[data-theme="system"] .theme-toggle{--theme-toggle-bg:#f5f5f5;--theme-toggle-inner:#ebecef;--theme-icon:#202124}
[data-theme="dark"] .theme-toggle-icon-light{opacity:0;transform:scale(.72)}
[data-theme="dark"] .theme-toggle-icon-dark{opacity:1;transform:scale(1)}
[data-theme="system"] .theme-toggle-icon-light{opacity:0;transform:scale(.72)}
[data-theme="system"] .theme-toggle-icon-system{opacity:1;transform:scale(1)}
[data-theme="light"] .theme-toggle:hover{box-shadow:0 10px 24px rgba(0,0,0,.20)}
[data-theme="dark"] .theme-toggle:hover{box-shadow:0 10px 24px rgba(0,0,0,.12)}
.theme-toggle-tooltip{pointer-events:none;position:absolute;left:50%;top:calc(100% + 8px);transform:translateX(-50%);white-space:nowrap;border-radius:6px;background:#111827;color:#fff;padding:5px 8px;font-size:12px;line-height:1.2;opacity:0;transition:opacity .2s ease;z-index:20}
.theme-toggle:hover .theme-toggle-tooltip{opacity:1}
.theme-toggle{position:relative;border:none!important;border-radius:999px!important;background:var(--surface-2)!important;color:var(--text)!important;width:40px;height:40px;padding:0!important;min-width:40px;box-shadow:none;transition:all .3s ease;display:inline-flex;align-items:center;justify-content:center}
.theme-toggle:hover{background:var(--surface)!important;box-shadow:0 0 0 2px rgba(24,24,27,.12)}
[data-theme="dark"] .theme-toggle{background:#27272a!important;color:#fbbf24!important}
[data-theme="dark"] .theme-toggle:hover{box-shadow:0 0 0 2px rgba(244,244,245,.16)}
.theme-toggle .theme-toggle-icon-wrap{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px}
.theme-toggle-icon-wrap{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;position:relative}
.theme-toggle-icon{position:absolute;width:20px;height:20px;transition:all .3s cubic-bezier(0.4,0,0.2,1);opacity:1;transform:scale(1)}
.theme-toggle-icon-light{opacity:1;transform:scale(1)}
.theme-toggle-icon-dark{opacity:0;transform:scale(0.8)}
.theme-toggle-icon-system{opacity:0;transform:scale(0.8)}
[data-theme="dark"] .theme-toggle-icon-light{opacity:0;transform:scale(0.8)}
[data-theme="dark"] .theme-toggle-icon-dark{opacity:1;transform:scale(1)}
.theme-toggle-icon-system{opacity:0;transform:scale(0.8)}
.current-theme-system .theme-toggle-icon-system{opacity:1;transform:scale(1)}
.theme-toggle-icon-light path,.theme-toggle-icon-light circle{stroke:var(--text)!important}
.theme-toggle-icon-dark path{stroke:var(--text)!important}
.theme-toggle-icon-system rect,.theme-toggle-icon-system path{stroke:var(--text)!important}
.theme-toggle .theme-toggle-tooltip{pointer-events:none;position:absolute;left:50%;top:calc(100% + 8px);transform:translateX(-50%);white-space:nowrap;border-radius:6px;background:#111827;color:#fff;padding:5px 8px;font-size:12px;line-height:1.2;opacity:0;transition:opacity .2s ease;z-index:20}
.theme-toggle:hover .theme-toggle-tooltip{opacity:1}

/* ── Panels ── */
.panel{display:none;flex:1;padding:24px;max-width:1100px;margin:0 auto;width:100%}
.panel.active{display:block}

/* ── Post List ── */
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.panel-header h2{font-size:16px;font-weight:600}
.post-list{display:flex;flex-direction:column;gap:8px}
.post-item{background:color-mix(in srgb,var(--surface) 94%,transparent);border:1px solid color-mix(in srgb,var(--border) 88%,transparent);border-radius:22px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;transition:border-color .2s ease,transform .2s ease,box-shadow .2s ease;box-shadow:0 10px 30px rgba(15,23,42,.04)}
.post-item:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 14px 34px rgba(37,99,235,.08)}
.post-item-info{flex:1;min-width:0}
.post-item-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-item-meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:10px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--surface-2);border:1px solid var(--border);color:var(--muted)}
.badge-draft{background:#fef9c3;border-color:#fde047;color:#854d0e}
.post-item-actions{display:flex;gap:6px;flex-shrink:0}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{margin:0 auto 12px;opacity:.4}
.empty-state p{font-size:13px}

/* ── Editor ── */
#editor-panel{display:none}
#editor-panel.active{display:block}
.editor-layout{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}
@media(max-width:900px){.topbar{height:auto;min-height:64px;padding:12px 16px;align-items:flex-start;flex-direction:column;gap:12px}.topbar-left,.topbar-right{width:100%}.topbar-left{flex-direction:column;align-items:flex-start;gap:12px}.tab-nav{width:100%;overflow:auto;padding:4px}.topbar-right{justify-content:flex-end}}
@media(max-width:768px){.editor-layout{grid-template-columns:1fr}}
.editor-main{display:flex;flex-direction:column;gap:14px}
.editor-sidebar{display:flex;flex-direction:column;gap:12px;position:sticky;top:72px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.form-input{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:11px 14px;font-size:13px;color:var(--text);outline:none;transition:border-color .2s ease,box-shadow .2s ease,background .2s ease;width:100%}
.form-input:focus{border-color:color-mix(in srgb,var(--accent) 78%,white);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 14%,transparent);background:var(--surface-2)}
.form-textarea{resize:vertical;min-height:72px;font-family:inherit}
.sidebar-card{background:color-mix(in srgb,var(--surface) 92%,transparent);border:1px solid color-mix(in srgb,var(--border) 86%,transparent);border-radius:24px;padding:16px;display:flex;flex-direction:column;gap:12px;box-shadow:0 14px 34px rgba(15,23,42,.05)}
.sidebar-card-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:2px}
.form-select{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:11px 14px;font-size:13px;color:var(--text);outline:none;width:100%;cursor:pointer;transition:border-color .2s ease,box-shadow .2s ease,background .2s ease}
.form-select:focus{border-color:color-mix(in srgb,var(--accent) 78%,white);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 14%,transparent);background:var(--surface-2)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:13px}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:background .15s}
.toggle-slider::before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .15s}
.toggle input:checked+.toggle-slider{background:var(--accent)}
.toggle input:checked+.toggle-slider::before{transform:translateX(16px)}
.meta-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.meta-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--border);border-radius:999px;background:var(--surface-2);color:var(--muted)}
.editor-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:4px}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent-hover)}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--primary);color:var(--primary-contrast);padding:10px 16px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.error{background:var(--error)}
#toast.success{background:var(--success)}

/* Loading overlay */
.loading{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9998;display:none}
.loading.show{display:flex}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* EasyMDE overrides */
.EasyMDEContainer .CodeMirror{border-radius:0 0 var(--radius) var(--radius);font-size:13px;font-family:'SF Mono','Fira Code',monospace;background:var(--surface);color:var(--text);border-color:var(--border)}
.EasyMDEContainer .editor-toolbar{border-radius:var(--radius) var(--radius) 0 0;background:var(--surface-2);border-color:var(--border)}
.EasyMDEContainer .editor-toolbar button{color:var(--muted)!important}
.EasyMDEContainer .editor-toolbar button:hover,.EasyMDEContainer .editor-toolbar button.active{background:var(--bg)!important;border-color:var(--border)!important}
.EasyMDEContainer .editor-statusbar{color:var(--muted);font-size:11px}
.cover-preview{display:none;overflow:hidden;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface-2)}
.cover-preview.show{display:block}
.cover-preview img{display:block;width:100%;aspect-ratio:16/9;object-fit:cover}
.helper-text{font-size:11px;color:var(--muted);line-height:1.5}

.btn-logout{-webkit-appearance:none;appearance:none;outline:none;box-shadow:none!important;border-radius:999px;padding:6px 16px;font-size:13px;font-weight:600;background:var(--surface-2);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:background .15s,color .15s,border-color .15s,box-shadow .15s;tap-highlight-color:transparent;-webkit-tap-highlight-color:transparent}
.btn-logout:hover{background:#dc2626;color:#fff;border-color:transparent;box-shadow:none}
.btn-logout:focus,.btn-logout:focus-visible,.btn-logout:active{outline:none;box-shadow:none}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-shell">
    <div class="login-card">
    <h1 id="login-title">Blog Admin</h1>
    <p id="login-desc">输入后台密码与 GitHub Token 进入管理后台</p>
    <div class="field" id="password-field">
      <label>密码</label>
      <input type="password" id="password-input" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <div class="field" id="password-confirm-field" style="display:none">
      <label>确认密码</label>
      <input type="password" id="password-confirm-input" placeholder="请再次输入密码" autocomplete="new-password">
    </div>
    <div class="field">
      <label>GitHub Token</label>
      <input type="password" id="token-input" placeholder="ghp_xxx 或 github_pat_xxx" autocomplete="off">
      <span id="token-help" style="font-size:11px;color:var(--muted);margin-top:2px">GitHub Token 将保存在云端 KV；已保存后换设备登录无需再次输入，留空表示继续使用当前 Token</span>
    </div>
    <button class="btn btn-primary" onclick="handleAuthSubmit()" id="login-submit-btn">登录</button>
    <p class="error-msg" id="login-error">密码错误，请重试</p>
  </div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="logo">Blog Admin</span>
      <nav class="tab-nav">
        <button class="tab active" onclick="switchTab('posts')">文章</button>
        <button class="tab" onclick="switchTab('friends')">友链</button>
        <button class="tab" onclick="switchTab('settings')">设置</button>
      </nav>
    </div>
    <div class="topbar-right">
      <button class="btn-logout" onclick="logout()">退出登录</button>
    </div>
  </div>

  <!-- Posts Panel -->
  <div class="panel active" id="posts-panel">
    <div class="panel-header">
      <h2>文章管理</h2>
      <button class="btn btn-accent" onclick="openEditor(null)">＋ 新建文章</button>
    </div>
    <div class="post-list" id="post-list">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>还没有文章，点击右上角新建</p>
      </div>
    </div>
  </div>

  <!-- Friends Panel -->
  <div class="panel" id="friends-panel">
    <div class="panel-header">
      <h2>友情链接</h2>
      <button class="btn btn-accent" onclick="openFriendEditor(null)">＋ 新建友链</button>
    </div>
    <div class="post-list" id="friend-list">
      <div class="empty-state">
        <p>还没有友链</p>
      </div>
    </div>
  </div>

  <!-- Editor Panel -->
  <div class="panel" id="editor-panel">
    <div class="panel-header">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn btn-sm btn-ghost" onclick="backToList()">← 返回</button>
        <h2 id="editor-title">新建文章</h2>
      </div>
      <div class="editor-actions">
        <button class="btn btn-sm btn-ghost btn-danger" id="delete-btn" onclick="deletePost()" style="display:none">删除</button>
        <button class="btn btn-sm btn-ghost" type="button" onclick="previewPost()">预览文章</button>
        <button class="btn btn-sm btn-ghost" type="button" onclick="copyPostLink()">复制链接</button>
        <button class="btn btn-sm btn-ghost" onclick="backToList()">取消</button>
        <button class="btn btn-sm btn-accent" onclick="savePost()">发布到 GitHub</button>
      </div>
    </div>
    <div class="editor-layout">
      <div class="editor-main">
        <div class="form-group">
          <label class="form-label">文章标题</label>
          <input type="text" class="form-input" id="f-title" placeholder="输入文章标题">
        </div>
        <div class="form-group">
          <label class="form-label">正文（Markdown）</label>
          <textarea id="f-body"></textarea>
        </div>
      </div>
      <div class="editor-sidebar">
        <div class="sidebar-card">
          <div class="sidebar-card-title">基本信息</div>

const ADMIN_THEME_KEY = 'admin-theme';

function resolveSystemTheme() {
  return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function getPreferredTheme() {
  try {
    const saved = localStorage.getItem(ADMIN_THEME_KEY);
    if (saved === 'system' || saved === 'light' || saved === 'dark') return saved;
  } catch (error) {
    console.warn('Failed to read theme:', error);
  }
  return 'system';
}

function getThemeMetaTag() {
  return document.querySelector('meta[name="theme-color"]');
}

function updateThemeToggle() {
  const btn = document.getElementById('theme-toggle-btn');
  if (!btn) return;
  const tooltip = btn.querySelector('.theme-toggle-tooltip');
  if (tooltip) tooltip.textContent = currentTheme === 'system' ? '跟随系统' : currentTheme === 'dark' ? '暗色' : '浅色';
}

function applyTheme(theme, persist = true) {
  currentTheme = theme === 'dark' || theme === 'light' ? theme : 'system';
  const resolvedTheme = currentTheme === 'system' ? resolveSystemTheme() : currentTheme;
  document.documentElement.setAttribute('data-theme', resolvedTheme);
  const meta = getThemeMetaTag();
  if (meta) meta.setAttribute('content', resolvedTheme === 'dark' ? '#111110' : '#f5f5f4');
  updateThemeToggle();
  if (persist) {
    try {
      localStorage.setItem(ADMIN_THEME_KEY, currentTheme);
    } catch (error) {
      console.warn('Failed to persist theme:', error);
    }
  }
}

function toggleTheme() {
  const nextTheme = currentTheme === 'system' ? 'light' : currentTheme === 'light' ? 'dark' : 'system';
  applyTheme(nextTheme);
}

function initTheme() {
  // Theme is fully handled by CSS @media (prefers-color-scheme: dark)

// ── 密码哈希 ──────────────────────────────────────
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ── 登录 ──────────────────────────────────────────
let authMode = 'login';
let sessionAuthenticated = false;
let authStatus = { initialized: false, authenticated: false, hasToken: false };

function updateTokenHint() {
  const hint = document.getElementById('token-help');
  if (!hint) return;
  if (authMode === 'setup') {
    hint.textContent = '首次初始化必须输入 GitHub Token，保存后会存入云端 KV。';
    return;
  }
  hint.textContent = authStatus.hasToken
    ? '当前 GitHub Token 已保存到云端，留空即可继续使用；输入新 Token 可覆盖旧值。'
    : '当前还没有保存 GitHub Token，请输入一次并保存到云端。';
}


function setAuthMode(mode) {
  authMode = mode;
  const title = document.getElementById('login-title');
  const desc = document.getElementById('login-desc');
  const passwordField = document.getElementById('password-field');
  const confirmField = document.getElementById('password-confirm-field');
  const submitBtn = document.getElementById('login-submit-btn');
  const error = document.getElementById('login-error');
  if (error) error.style.display = 'none';

  if (mode === 'setup') {
    if (title) title.textContent = '首次设置后台密码';
    if (desc) desc.textContent = '首次进入后台，请先设置登录密码，并保存一个 GitHub Token 到云端。';
    if (passwordField) passwordField.style.display = 'block';
    if (confirmField) confirmField.style.display = 'block';
    if (submitBtn) submitBtn.textContent = '设置密码并进入后台';
    updateTokenHint();
    return;
  }

  if (mode === 'session') {
    if (title) title.textContent = '继续进入后台';
    if (desc) desc.textContent = '登录状态已恢复，正在进入后台。';
    if (passwordField) passwordField.style.display = 'none';
    if (confirmField) confirmField.style.display = 'none';
    if (submitBtn) submitBtn.textContent = '进入后台';
    updateTokenHint();
    return;
  }

  if (title) title.textContent = 'Blog Admin';
  if (desc) desc.textContent = '输入后台密码进入管理后台；如需更新 GitHub Token，可在下方输入新值。';
  if (passwordField) passwordField.style.display = 'block';
  if (confirmField) confirmField.style.display = 'none';
  if (submitBtn) submitBtn.textContent = '登录';
  updateTokenHint();
}

function setAuthInputs(password = '', token = '') {
  const passwordInput = document.getElementById('password-input');
  const confirmInput = document.getElementById('password-confirm-input');
  const tokenInput = document.getElementById('token-input');
  if (passwordInput) passwordInput.value = password;
  if (confirmInput) confirmInput.value = '';
  if (tokenInput) tokenInput.value = token || '';
}

async function fetchAuthStatus() {
  const res = await fetch('/api/admin/auth/status', { credentials: 'same-origin' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function restoreLogin() {
  try {
    const status = await fetchAuthStatus();
    authStatus = {
      initialized: !!status.initialized,
      authenticated: !!status.authenticated,
      hasToken: !!status.hasToken,
    };
    sessionAuthenticated = authStatus.authenticated;
    setAuthInputs('', '');

    if (!authStatus.initialized) {
      setAuthMode('setup');
      return;
    }

    if (authStatus.authenticated) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      updateTokenHint();
      loadData();
      return;
    }

    setAuthMode('login');
  } catch (error) {
    console.warn('Failed to restore login:', error);
    setAuthMode('login');
  }
}

async function handleAuthSubmit() {
  const pwd = document.getElementById('password-input').value;
  const confirmPwd = document.getElementById('password-confirm-input')?.value || '';
  const token = document.getElementById('token-input').value.trim();
  const error = document.getElementById('login-error');
  const hasInputToken = !!token;
  const hasStoredToken = !!authStatus.hasToken;

  if (hasInputToken && !(token.startsWith('ghp_') || token.startsWith('github_pat_'))) {
    showToast('请输入有效的 GitHub Token', 'error');
    return;
  }

  if (!pwd || pwd.length < 6) {
    error.textContent = '密码至少需要 6 位';
    error.style.display = 'block';
    return;
  }

  if (authMode === 'setup' && pwd !== confirmPwd) {
    error.textContent = '两次输入的密码不一致';
    error.style.display = 'block';
    return;
  }

  if (authMode === 'setup' && !hasInputToken) {
    error.textContent = '首次初始化必须输入 GitHub Token';
    error.style.display = 'block';
    return;
  }

  if (authMode !== 'setup' && !hasStoredToken && !hasInputToken) {
    error.textContent = '当前还没有保存 GitHub Token，请先输入一次';
    error.style.display = 'block';
    return;
  }

  const endpoint = authMode === 'setup' ? '/api/admin/auth/setup' : '/api/admin/auth/login';
  const payload = { password: pwd };
  if (hasInputToken) payload.token = token;

  const res = await fetch(endpoint, {
    method: 'POST',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const result = await res.json().catch(() => ({}));
  if (!res.ok || !result.ok) {
    error.textContent = result.error || '登录失败';
    error.style.display = 'block';
    return;
  }

  sessionAuthenticated = true;
  authStatus = {
    initialized: true,
    authenticated: true,
    hasToken: hasStoredToken || hasInputToken,
  };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  error.style.display = 'none';
  setAuthInputs('', '');
  updateTokenHint();
  loadData();
}

document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (authMode === 'setup') document.getElementById('password-confirm-input').focus();
    else document.getElementById('token-input').focus();

});
document.getElementById('password-confirm-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('token-input').focus();
});
document.getElementById('token-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleAuthSubmit();
});

// ── GitHub API ────────────────────────────────────
async function ghAPI(path, method = 'GET', body = null) {
  const res = await fetch('/api/admin/github', {
    method: 'POST',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, method, body }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || err.error || `HTTP ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

async function getFileSha(path) {
  try { const f = await ghAPI(`contents/${path}?ref=${BRANCH}`); return f.sha; }
  catch { return null; }
}

async function listDir(dir) {
  try { return await ghAPI(`contents/${dir}?ref=${BRANCH}`); }
  catch { return []; }
}

async function getFileContent(path) {
  const f = await ghAPI(`contents/${path}?ref=${BRANCH}`);
  const content = decodeURIComponent(escape(atob(f.content.replace(/\n/g, ''))));
  return { sha: f.sha, content };
}

    currentSettings = { sha: settingsFile.sha, raw: settingsFile.content };

    renderSettingsForm();
  } catch(e) {
    showToast('加载失败：' + e.message, 'error');

  showLoading(false);
}

  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('editor-panel').classList.add('active');

  const today = new Date().toISOString().slice(0, 10);
  document.getElementById('f-date').value = today;
  document.getElementById('f-updated').value = '';
  document.getElementById('f-title').value = '';
  document.getElementById('f-id').value = '';
  document.getElementById('f-excerpt').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('f-cover').value = '';
  document.getElementById('f-top').value = '';
  document.getElementById('f-featured').checked = false;
  document.getElementById('f-draft').checked = false;
  document.getElementById('delete-btn').style.display = 'none';
  updateCoverPreview();
  document.getElementById('editor-title').textContent = '新建文章';

  if (easyMDE) { easyMDE.toTextArea(); easyMDE = null; }
  document.getElementById('f-body').value = '';

  if (idx !== null) {
    showLoading(true);
    try {
      const file = await ghAPI(`contents/${posts[idx].path}?ref=${BRANCH}`);
      const raw = atob(file.content.replace(/\n/g, ''));
      const decoded = new TextDecoder().decode(Uint8Array.from([...raw].map(c => c.charCodeAt(0))));
      currentPost = { ...posts[idx], sha: file.sha };
      // 解析 frontmatter
      const fm = decoded.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
      if (fm) {
        const meta = fm[1];
        const body = fm[2].trim();
        const get = (key) => { const m = meta.match(new RegExp(`^${key}:\\s*(.+)$`, 'm')); return m ? m[1].trim().replace(/^['"]|['"]$/g, '') : ''; };
        const getArr = (key) => {
          const m = meta.match(new RegExp(`^${key}:\\n((?:  - .+\\n?)+)`, 'm'));
          if (!m) { const inline = get(key); return inline ? inline.replace(/[\[\]]/g,'').split(',').map(s=>s.trim()).filter(Boolean) : []; }
          return m[1].trim().split('\n').map(s => s.replace(/^\s*-\s*/, '').trim());
        };
        document.getElementById('f-title').value = get('title');
        document.getElementById('f-id').value = get('id');
        document.getElementById('f-excerpt').value = get('excerpt');
        document.getElementById('f-date').value = get('date');
        document.getElementById('f-updated').value = get('updatedAt');
        document.getElementById('f-category').value = get('category') || '其他';
        document.getElementById('f-tags').value = getArr('tags').join(', ');
        document.getElementById('f-cover').value = get('coverImage');
        document.getElementById('f-top').value = get('top');
        document.getElementById('f-featured').checked = get('featured') === 'true';
        document.getElementById('f-draft').checked = get('draft') === 'true';
        document.getElementById('f-body').value = body;
        updateCoverPreview();
      }
      document.getElementById('delete-btn').style.display = 'inline-flex';
      document.getElementById('editor-title').textContent = '编辑文章';
    } catch(e) { showToast('加载失败：' + e.message, 'error'); }
    showLoading(false);
  } else {
    currentPost = null;
  }

  // 初始化 EasyMDE
  easyMDE = new EasyMDE({
    element: document.getElementById('f-body'),
    spellChecker: false,
    autosave: { enabled: false },
    toolbar: ['bold','italic','heading','|','quote','unordered-list','ordered-list','|','link','image','table','|','preview','side-by-side','fullscreen'],
    minHeight: '400px',
    placeholder: '在此输入 Markdown 正文...',
  });
}

async function savePost() {
  const id = document.getElementById('f-id').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const excerpt = document.getElementById('f-excerpt').value.trim();
  const date = document.getElementById('f-date').value;
  const updated = document.getElementById('f-updated').value;
  const category = document.getElementById('f-category').value;
  const tags = document.getElementById('f-tags').value.split(',').map(s=>s.trim()).filter(Boolean);
  const cover = document.getElementById('f-cover').value.trim();
  const top = document.getElementById('f-top').value.trim();
  const featured = document.getElementById('f-featured').checked;
  const draft = document.getElementById('f-draft').checked;
  const body = easyMDE ? easyMDE.value() : document.getElementById('f-body').value;

  if (!id || !title || !excerpt || !date) { showToast('请填写必填项：ID、标题、摘要、日期', 'error'); return; }
  if (!/^[a-zA-Z0-9-]+$/.test(id)) { showToast('文章 ID 只能包含英文、数字和连字符', 'error'); return; }

  const tagsYaml = tags.length ? `\ntags:\n${tags.map(t => `  - ${t}`).join('\n')}` : '';
  const frontmatter = [
    '---',
    `id: ${id}`,
    `title: ${title}`,
    `excerpt: ${excerpt}`,
    `date: ${date}`,
    updated ? `updatedAt: ${updated}` : null,
    `category: ${category}`,
    tagsYaml ? `tags:${tagsYaml.slice(5)}` : null,
    cover ? `coverImage: ${cover}` : null,
    top ? `top: ${top}` : null,
    featured ? 'featured: true' : null,
    draft ? 'draft: true' : null,
    '---',
  ].filter(l => l !== null).join('\n');

  const content = `${frontmatter}\n\n${body}\n`;
  const encoded = btoa(unescape(encodeURIComponent(content)));
  const filePath = `posts/${id}.md`;

  showLoading(true);
  try {
    const sha = currentPost?.sha || await getFileSha(filePath);
    await ghAPI(`contents/${filePath}`, 'PUT', {
      message: currentPost ? `docs: update post "${title}"` : `docs: add post "${title}"`,
      content: encoded,
      branch: BRANCH,
      ...(sha ? { sha } : {}),
    });
    showToast('✓ 发布成功，GitHub Actions 正在构建...', 'success');
    await loadData();
    backToList();
  } catch(e) { showToast('发布失败：' + e.message, 'error'); }
  showLoading(false);
}

async function deletePost() {
  if (!currentPost || !confirm('确定要删除这篇文章吗？')) return;
  showLoading(true);
  try {
    await ghAPI(`contents/${currentPost.path}`, 'DELETE', {
      message: `docs: delete post "${currentPost.name}"`,
      sha: currentPost.sha,
      branch: BRANCH,
    });
    showToast('已删除', 'success');
    await loadData();
    backToList();
  } catch(e) { showToast('删除失败：' + e.message, 'error'); }
  showLoading(false);
}

function getSiteBaseUrl() {
  const input = document.getElementById('s-url');
  if (input && input.value.trim()) return input.value.trim().replace(/\/$/, '');
  const m = (currentSettings.raw || '').match(/url:\s*'([^']+)'/);
  return (m ? m[1] : window.location.origin).replace(/\/$/, '');
}

function getPreviewPostUrl() {
  const id = document.getElementById('f-id').value.trim();
  if (!id) return '';
  return `${getSiteBaseUrl()}/post/${encodeURIComponent(id)}`;
}

function updateCoverPreview() {
  const input = document.getElementById('f-cover');
  const wrap = document.getElementById('cover-preview');
  const img = document.getElementById('cover-preview-img');
  if (!input || !wrap || !img) return;
  const value = input.value.trim();
  if (!value) {
    wrap.classList.remove('show');
    img.removeAttribute('src');
    return;
  }
  const src = /^https?:\/\//i.test(value) ? value : `${getSiteBaseUrl()}${value.startsWith('/') ? '' : '/'}${value}`;
  img.onload = () => wrap.classList.add('show');
  img.onerror = () => {
    wrap.classList.remove('show');
    showToast('封面图加载失败，请检查 URL', 'error');
  };
  img.src = src;
}

function previewPost() {
  const url = getPreviewPostUrl();
  if (!url) {
    showToast('请先填写文章 ID', 'error');
    return;
  }
  window.open(url, '_blank', 'noopener,noreferrer');
}

async function copyPostLink() {
  const url = getPreviewPostUrl();
  if (!url) {
    showToast('请先填写文章 ID', 'error');
    return;
  }
  try {
    await navigator.clipboard.writeText(url);
    showToast('文章链接已复制', 'success');
  } catch {
    const input = document.createElement('input');
    input.value = url;
    document.body.appendChild(input);
    input.select();
    document.execCommand('copy');
    input.remove();
    showToast('文章链接已复制', 'success');
  }
}

function readConfigValue(source, pattern, fallback = '') {
  const match = source.match(pattern);
  return match ? match[1] : fallback;
}

function parseSiteConfig(source) {
  return {
    title: readConfigValue(source, /title:\s*'([^']*)'/),
    subtitle: readConfigValue(source, /subtitle:\s*'([^']*)'/),
    description: readConfigValue(source, /description:\s*'([^']*)'/),
    logo: readConfigValue(source, /logo:\s*'([^']*)'/),
    seoImage: readConfigValue(source, /seoImage:\s*'([^']*)'/),
    footerText: readConfigValue(source, /footerText:\s*'([^']*)'/),
    runtimeStartDate: readConfigValue(source, /runtimeStartDate:\s*'([^']*)'/),
    runtimeShowHours: readConfigValue(source, /runtimeShowHours:\s*(true|false)/),
    runtimeShowMinutes: readConfigValue(source, /runtimeShowMinutes:\s*(true|false)/),
    runtimeShowSeconds: readConfigValue(source, /runtimeShowSeconds:\s*(true|false)/),
    url: readConfigValue(source, /url:\s*'([^']*)'/),
    github: readConfigValue(source, /github:\s*'([^']*)'/),
    email: readConfigValue(source, /email:\s*'([^']*)'/),
    rawEmail: readConfigValue(source, /rawEmail:\s*'([^']*)'/),
    authorName: readConfigValue(source, /name:\s*'([^']*)'/),
    authorAvatar: readConfigValue(source, /avatar:\s*'([^']*)'/),
    authorRole: readConfigValue(source, /role:\s*'([^']*)'/),
    authorBio: readConfigValue(source, /bio:\s*'([^']*)'/),
    repoUrl: readConfigValue(source, /repoUrl:\s*'([^']*)'/),
    repoFriendsUrl: readConfigValue(source, /repoFriendsUrl:\s*'([^']*)'/),
    repoFriendsDir: readConfigValue(source, /repoFriendsDir:\s*'([^']*)'/),
    announcement: readConfigValue(source, /announcement:\s*'([^']*)'/),
    beianText: readConfigValue(source, /beian:\s*\{[\s\S]*?text:\s*'([^']*)'/),
    beianUrl: readConfigValue(source, /beian:\s*\{[\s\S]*?url:\s*'([^']*)'/),
    umamiScriptSrc: readConfigValue(source, /analytics:\s*\{[\s\S]*?umamiScriptSrc:\s*'([^']*)'/),
    umamiWebsiteId: readConfigValue(source, /analytics:\s*\{[\s\S]*?umamiWebsiteId:\s*'([^']*)'/),
    umamiShareUrl: readConfigValue(source, /analytics:\s*\{[\s\S]*?umamiShareUrl:\s*'([^']*)'/),
    statusPageUrl: readConfigValue(source, /analytics:\s*\{[\s\S]*?statusPageUrl:\s*'([^']*)'/),
  };
}

function escTS(value) {
  return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function showLoading(show) { document.getElementById('loading').classList.toggle('show', show); }

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3000);
}
