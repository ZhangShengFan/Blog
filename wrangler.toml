# Cloudflare Pages 配置
# 用于本地预览: npx wrangler pages dev dist
name = "blog"
compatibility_date = "2024-01-01"

[env.production]
vars = { ENVIRONMENT = "production" }

pages_build_output_dir = "dist"

[[kv_namespaces]]
binding = "KV"
id = "00000000000000000000000000000000"
preview_id = "00000000000000000000000000000000"
